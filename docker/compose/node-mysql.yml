# 本地示例：MySQL 8 + gateway-proxy（对外推理）+ gateway-admin（管理 UI / /api/admin/*）
# 二者共用同一 DATABASE_URL；镜像由本仓根目录 Dockerfile.* 构建。
# 迁移链：packages/core/migrations-mysql/（npm run db:migrate:mysql:docker）
#
# 可选环境变量（避免与本机端口冲突）：
#   GATEWAY_PROXY_HOST_PORT=8787 GATEWAY_ADMIN_HOST_PORT=8789 docker compose -f docker/compose/node-mysql.yml up -d gateway-proxy gateway-admin
#
#   docker compose -f docker/compose/node-mysql.yml up -d mysql
#   docker compose -f docker/compose/node-mysql.yml --profile migrate run --rm migrate
#   docker compose -f docker/compose/node-mysql.yml up -d gateway-proxy gateway-admin

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: octafuse_root
      MYSQL_DATABASE: octafuse
      MYSQL_USER: octafuse
      MYSQL_PASSWORD: octafuse
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - octafuse_mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uoctafuse",
          "-poctafuse",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  migrate:
    profiles: ["migrate"]
    build:
      context: ../..
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_DRIVER: mysql
      DATABASE_URL: mysql://octafuse:octafuse@mysql:3306/octafuse
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  gateway-proxy:
    build:
      context: ../..
      dockerfile: Dockerfile.proxy
    ports:
      - "${GATEWAY_PROXY_HOST_PORT:-8787}:8787"
    environment:
      DATABASE_DRIVER: mysql
      DATABASE_URL: mysql://octafuse:octafuse@mysql:3306/octafuse
      PORT: "8787"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway-admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    ports:
      - "${GATEWAY_ADMIN_HOST_PORT:-8789}:8789"
    environment:
      DATABASE_DRIVER: mysql
      DATABASE_URL: mysql://octafuse:octafuse@mysql:3306/octafuse
      PORT: "8789"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "changeme"
      # 可选加固：已用 HTTPS 访问 Admin 时可取消注释（见 docs/operators/deployment/docker.md §7.3）
      # ADMIN_COOKIE_SECURE: "1"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8789/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  octafuse_mysql:
