# gateway-proxy + gateway-admin（外置 Postgres，同机同时启动）。
# 迁移：使用 `--profile migrate` 的 migrate 服务（octafuse-migrate）。
# Usage:
#   cp env.compose.external.example .env
#   docker compose --env-file .env -f gateway.compose.yml --profile migrate run --rm migrate
#   docker compose --env-file .env -f gateway.compose.yml up -d

services:
  migrate:
    profiles: ["migrate"]
    image: ${GATEWAY_MIGRATE_IMAGE:?set GATEWAY_MIGRATE_IMAGE in .env}
    environment:
      DATABASE_DRIVER: ${DATABASE_DRIVER:-postgres}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
    restart: "no"

  gateway-proxy:
    image: ${GATEWAY_PROXY_IMAGE:?set GATEWAY_PROXY_IMAGE in .env}
    ports:
      # 宿主机端口可配；容器内进程固定监听 8787（与 Dockerfile.proxy 一致）
      - "${GATEWAY_PROXY_PORT:-18787}:8787"
    environment:
      DATABASE_DRIVER: ${DATABASE_DRIVER:-postgres}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      PORT: "8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway-admin:
    image: ${GATEWAY_ADMIN_IMAGE:?set GATEWAY_ADMIN_IMAGE in .env}
    ports:
      # 宿主机端口可配；容器内进程固定监听 8789（与 Dockerfile.admin 一致）
      - "${GATEWAY_ADMIN_PORT:-18789}:8789"
    environment:
      DATABASE_DRIVER: ${DATABASE_DRIVER:-postgres}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      PORT: "8789"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      # 可选加固；需要时在 .env 设 ADMIN_COOKIE_SECURE=1（见 docs/operators/deployment/docker.md §7.3）
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8789/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
