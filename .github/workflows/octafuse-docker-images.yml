# 构建并推送 Octafuse 镜像到 GHCR。
#
# 正式发布：推送语义化 Git 标签 vX.Y.Z（由 Release workflow 的 `changeset tag` 产生）触发本 workflow，
# 默认构建 proxy + admin + migrate，linux/amd64 与 linux/arm64；推送后创建/更新 GitHub Release（正文含 CHANGELOG 对应版本段与各镜像 digest）。
#
# 应急：仍可使用 workflow_dispatch 手动构建（不创建 GitHub Release）。
#
# 镜像名：ghcr.io/<github.repository 小写>-{proxy,admin,migrate}（本仓示例：ghcr.io/octafuse/octafuse-gateway-proxy 等）
#
# 若出现 `Post "https://ghcr.io/token": unexpected EOF`：多为网络/TLS 或并发推送；本 workflow 已关闭 provenance/sbom、限制矩阵并行。

name: Octafuse Docker Images (GH hosted Ubuntu)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_proxy:
        description: 构建并推送 proxy 镜像（Dockerfile.proxy）
        type: boolean
        default: true
      build_admin:
        description: 构建并推送 admin 镜像（Dockerfile.admin）
        type: boolean
        default: true
      build_migrate:
        description: 构建并推送 migrate 镜像（Dockerfile.migrate）
        type: boolean
        default: true
      platform_linux_amd64:
        description: 构建 linux/amd64（常见 x86 云服务器）
        type: boolean
        default: true
      platform_linux_arm64:
        description: 构建 linux/arm64（Apple Silicon / ARM 云主机）
        type: boolean
        default: true

concurrency:
  group: octafuse-docker-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      platforms: ${{ steps.set-matrix.outputs.platforms }}
      is_tag_release: ${{ steps.set-matrix.outputs.is_tag_release }}
    steps:
      - id: set-matrix
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            items='[]'
            if [ "${{ inputs.build_proxy }}" = "true" ]; then
              items=$(echo "$items" | jq -c '. + [{"dockerfile":"Dockerfile.proxy","image_suffix":"proxy"}]')
            fi
            if [ "${{ inputs.build_admin }}" = "true" ]; then
              items=$(echo "$items" | jq -c '. + [{"dockerfile":"Dockerfile.admin","image_suffix":"admin"}]')
            fi
            if [ "${{ inputs.build_migrate }}" = "true" ]; then
              items=$(echo "$items" | jq -c '. + [{"dockerfile":"Dockerfile.migrate","image_suffix":"migrate"}]')
            fi
            n=$(echo "$items" | jq 'length')
            if [ "$n" -eq 0 ]; then
              echo '::error title=无构建目标::请至少勾选 build_proxy、build_admin 或 build_migrate 之一'
              exit 1
            fi
            matrix=$(jq -cn --argjson include "$items" '{include:$include}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

            plats=()
            if [ "${{ inputs.platform_linux_amd64 }}" = "true" ]; then
              plats+=("linux/amd64")
            fi
            if [ "${{ inputs.platform_linux_arm64 }}" = "true" ]; then
              plats+=("linux/arm64")
            fi
            if [ "${#plats[@]}" -eq 0 ]; then
              echo '::error title=无平台选择::请至少勾选 platform_linux_amd64 或 platform_linux_arm64 之一'
              exit 1
            fi
            joined=$(printf '%s,' "${plats[@]}")
            joined="${joined%,}"
            echo "platforms=$joined" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
            echo "Resolved platforms: $joined"
          else
            # 正式发版：标签推送，固定三镜像 + 双平台
            matrix=$(jq -cn '[{"dockerfile":"Dockerfile.proxy","image_suffix":"proxy"},{"dockerfile":"Dockerfile.admin","image_suffix":"admin"},{"dockerfile":"Dockerfile.migrate","image_suffix":"migrate"}] | {include:.}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag release: all images, platforms linux/amd64,linux/arm64"
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "repository_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image destinations (GHCR)
        id: imgs
        env:
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.repository_lc }}-${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          {
            echo "images<<EOF"
            echo "$GHCR_IMAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgs.outputs.images }}
          # 覆盖默认从 GitHub 仓库 About 拉取的 description（历史描述可能仍为 SoloEnt 文案）
          labels: |
            org.opencontainers.image.description=Octafuse gateway monorepo: AI Gateway (D1, Postgres, MySQL), Cloudflare Workers, and Node. https://github.com/OctaFuse/octafuse-gateway
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_suffix }}

      - name: Upload digest for release notes
        if: ${{ needs.prepare.outputs.is_tag_release == 'true' }}
        env:
          DIGEST: ${{ steps.docker_build.outputs.digest }}
          SUFFIX: ${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          echo "$DIGEST" > "${SUFFIX}.digest"

      - name: Upload digest artifact
        if: ${{ needs.prepare.outputs.is_tag_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: octafuse-image-digest-${{ matrix.image_suffix }}
          path: ${{ matrix.image_suffix }}.digest

      - name: Image digest (log)
        run: |
          echo "Image: ${{ matrix.dockerfile }} (${{ matrix.image_suffix }})"
          echo "Digest: ${{ steps.docker_build.outputs.digest }}"
          echo "Pushed tags:" && echo '${{ steps.meta.outputs.tags }}'

  publish-release:
    needs: [prepare, build-and-push]
    if: ${{ needs.prepare.outputs.is_tag_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (CHANGELOG only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: octafuse-image-digest-*
          path: digest-artifacts
          merge-multiple: true

      - name: Write GitHub Release notes
        run: |
          set -euo pipefail
          OWNER_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver "$" {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md > changelog-section.md || true
          if [ ! -s changelog-section.md ]; then
            echo "_(CHANGELOG 中未找到 \`## ${VERSION}\` 段落；请核对 Version PR 是否更新了 CHANGELOG。)_" > changelog-section.md
          fi
          resolve_digest_file() {
            local s="$1"
            find digest-artifacts -name "${s}.digest" -type f 2>/dev/null | head -1
          }
          {
            echo "## What's changed"
            echo ""
            cat changelog-section.md
            echo ""
            echo "---"
            echo ""
            echo "## Container images (GHCR)"
            echo ""
            echo "Tag **${TAG}** — multi-arch manifest digests (proxy / admin / migrate):"
            echo ""
            for s in proxy admin migrate; do
              f=$(resolve_digest_file "$s")
              if [ -n "$f" ] && [ -f "$f" ]; then
                d=$(tr -d '\n\r' < "$f")
                echo "- **${s}**: \`${d}\`"
                echo "  - \`ghcr.io/${OWNER_REPO_LC}-${s}@${d}\`"
              else
                echo "- **${s}**: _(digest artifact missing)_"
              fi
            done
            echo ""
            echo "Pull by digest for reproducible deploys, or by tag \`${TAG}\` after verifying digest."
            echo ""
            echo "---"
            echo ""
            echo "Release process: [.changeset/README.md](.changeset/README.md) · [docs/ops/release-versioning.md](docs/ops/release-versioning.md)"
          } > release-notes.md
          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file release-notes.md
          else
            gh release create "$TAG" --repo "${{ github.repository }}" --title "Octafuse ${TAG}" --notes-file release-notes.md
          fi
