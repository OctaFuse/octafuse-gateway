# 自托管 macOS ARM64 runner 专用：构建并推送 Octafuse 镜像到 GHCR（可选 ACR 双推）。
# 与「Octafuse Docker Images (GH hosted Ubuntu)」分流：本文件用于自建机网络/环境验证或专用调试。
# 镜像：ghcr.io/<owner>/octafuse-{proxy,admin,migrate}
#
# 平台说明：runner 为 Apple Silicon，仅构建 linux/arm64 时可跳过 QEMU；勾选 linux/amd64 时需 QEMU（易卡在 Docker Hub pull）。
# 默认仅 linux/amd64；需要 arm64 产物时请勾选 platform_linux_arm64。
#
# 自建 runner 若出现 `Post "https://ghcr.io/token": unexpected EOF`：多为到 GHCR 的网络/TLS 不稳定；
# 本 workflow 已关闭 provenance/sbom、限制矩阵并行；仍失败可重试 job 或改用官方 Ubuntu workflow。

name: Octafuse Docker Images (self-hosted macOS ARM64)

on:
  workflow_dispatch:
    inputs:
      build_proxy:
        description: 构建并推送 proxy 镜像（docker/build/Dockerfile.proxy）
        type: boolean
        default: true
      build_admin:
        description: 构建并推送 admin 镜像（docker/build/Dockerfile.admin）
        type: boolean
        default: true
      build_migrate:
        description: 构建并推送 migrate 镜像（docker/build/Dockerfile.migrate）
        type: boolean
        default: true
      platform_linux_amd64:
        description: 构建 linux/amd64（常见 x86 云服务器；在 ARM Mac 上需 QEMU）
        type: boolean
        default: true
      platform_linux_arm64:
        description: 构建 linux/arm64（Apple Silicon / ARM 云主机；在 ARM Mac 上通常可免 QEMU）
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      platforms: ${{ steps.set-matrix.outputs.platforms }}
      needs_qemu: ${{ steps.set-matrix.outputs.needs_qemu }}
    steps:
      - id: set-matrix
        run: |
          set -euo pipefail
          items='[]'
          if [ "${{ inputs.build_proxy }}" = "true" ]; then
            items=$(echo "$items" | jq -c '. + [{"dockerfile":"docker/build/Dockerfile.proxy","image_suffix":"proxy"}]')
          fi
          if [ "${{ inputs.build_admin }}" = "true" ]; then
            items=$(echo "$items" | jq -c '. + [{"dockerfile":"docker/build/Dockerfile.admin","image_suffix":"admin"}]')
          fi
          if [ "${{ inputs.build_migrate }}" = "true" ]; then
            items=$(echo "$items" | jq -c '. + [{"dockerfile":"docker/build/Dockerfile.migrate","image_suffix":"migrate"}]')
          fi
          n=$(echo "$items" | jq 'length')
          if [ "$n" -eq 0 ]; then
            echo '::error title=无构建目标::请至少勾选 build_proxy、build_admin 或 build_migrate 之一'
            exit 1
          fi
          matrix=$(jq -cn --argjson include "$items" '{include:$include}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

          plats=()
          if [ "${{ inputs.platform_linux_amd64 }}" = "true" ]; then
            plats+=("linux/amd64")
          fi
          if [ "${{ inputs.platform_linux_arm64 }}" = "true" ]; then
            plats+=("linux/arm64")
          fi
          if [ "${#plats[@]}" -eq 0 ]; then
            echo '::error title=无平台选择::请至少勾选 platform_linux_amd64 或 platform_linux_arm64 之一'
            exit 1
          fi
          joined=$(printf '%s,' "${plats[@]}")
          joined="${joined%,}"
          echo "platforms=$joined" >> "$GITHUB_OUTPUT"
          echo "Resolved platforms: $joined"

          # ARM64 宿主机上构建 linux/amd64 需要 binfmt/QEMU；仅 linux/arm64 可跳过
          if [ "${{ inputs.platform_linux_amd64 }}" = "true" ]; then
            echo "needs_qemu=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_qemu=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: prepare
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "repository_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: ${{ needs.prepare.outputs.needs_qemu == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate ACR configuration
        id: acr
        env:
          ACR_REG: ${{ vars.ACR_REGISTRY }}
          ACR_NS: ${{ vars.ACR_NAMESPACE }}
          ACR_USER: ${{ vars.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$ACR_REG" ] && [ -n "$ACR_NS" ] && [ -n "$ACR_USER" ] && [ -n "$ACR_PASS" ]; then
            echo "acr_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "acr_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ACR
        if: ${{ steps.acr.outputs.acr_enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve image destinations (GHCR + optional ACR)
        id: imgs
        env:
          ACR_ENABLED: ${{ steps.acr.outputs.acr_enabled }}
          ACR_REG: ${{ vars.ACR_REGISTRY }}
          ACR_NS: ${{ vars.ACR_NAMESPACE }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.repository_lc }}-${{ matrix.image_suffix }}
          SUFFIX: ${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          {
            echo "images<<EOF"
            echo "$GHCR_IMAGE"
            if [ "$ACR_ENABLED" = "true" ]; then
              echo "${ACR_REG}/${ACR_NS}/octafuse-${SUFFIX}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgs.outputs.images }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_suffix }}

      - name: Image digest
        run: |
          echo "Image: ${{ matrix.dockerfile }} (${{ matrix.image_suffix }})"
          echo "Pushed tags:" && echo '${{ steps.meta.outputs.tags }}'
